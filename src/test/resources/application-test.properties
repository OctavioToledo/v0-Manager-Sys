# Supabase uses PgBouncer in transaction mode — prepared statements are not supported.
# These settings disable server-side prepared statements to allow Hibernate to boot.
spring.datasource.url=${DB_URL}?prepareThreshold=0
spring.jpa.properties.hibernate.jdbc.use_get_generated_keys=false
