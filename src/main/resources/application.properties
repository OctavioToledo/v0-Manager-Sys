spring.application.name=V1-Gestor
server.port=8080

# DATABASE POSTGRESQL (SUPABASE)
spring.datasource.url=${DB_URL}?prepareThreshold=0
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA CONFIG
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# AUTH0 CONFIGURATION
spring.security.oauth2.resourceserver.jwt.issuer-uri=${AUTH0_ISSUER_URI}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${AUTH0_JWK_SET_URI}
auth0.audience=${AUTH0_AUDIENCE}

# CORS
web.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# LOCAL JWT
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=86400000
