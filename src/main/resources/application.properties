spring.application.name=V1-Gestor

# DataSource
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Supabase PgBouncer (port 6543) uses transaction mode — disable server-side prepared statements
spring.datasource.hikari.data-source-properties.prepareThreshold=0

# Supabase JWT — ES256, validated via JWKS
supabase.jwks-uri=https://jpwtrmhsrowzmsjfnnap.supabase.co/auth/v1/.well-known/jwks.json

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
